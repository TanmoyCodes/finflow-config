# api-gateway.properties (NEW FILE)
server.port=${GATEWAY_PORT:8080}
jwt.secret=${JWT_SECRET}
gateway.secret=${GATEWAY_SECRET}

# Gateway Global Header
spring.cloud.gateway.server.webflux.default-filters[0].name=AddRequestHeader
spring.cloud.gateway.server.webflux.default-filters[0].args.name=X-Gateway-Secret
spring.cloud.gateway.server.webflux.default-filters[0].args.value=${GATEWAY_SECRET}

# Service Routes
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=application-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/application/**, /user/**, /admin/**

spring.cloud.gateway.server.webflux.routes[2].id=doc-verification
spring.cloud.gateway.server.webflux.routes[2].uri=lb://DOC-VERIFICATION
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/documents/**
